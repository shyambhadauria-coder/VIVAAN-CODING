<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Animation</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle, #0f2027, #203a43, #2c5364);
        overflow: hidden;
        font-family: Arial, sans-serif;
    }

    .box {
        width: 150px;
        height: 150px;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-weight: bold;
        text-align: center;
        border-radius: 20px;
        animation: crazyAnimation 6s infinite ease-in-out;
    }

    @keyframes crazyAnimation {
        0% {
            transform: translate(0, 0) rotate(0deg) scale(1);
            background: linear-gradient(45deg, #ff0000, #ff7300);
            box-shadow: 0 0 10px #ff0000;
        }
        25% {
            transform: translate(200px, -150px) rotate(90deg) scale(1.3);
            background: linear-gradient(45deg, #00ffcc, #0066ff);
            box-shadow: 0 0 25px #00ffcc;
        }
        50% {
            transform: translate(-200px, 150px) rotate(180deg) scale(0.8);
            background: linear-gradient(45deg, #ff00cc, #3333ff);
            box-shadow: 0 0 40px #ff00cc;
        }
        75% {
            transform: translate(150px, 100px) rotate(270deg) scale(1.5);
            background: linear-gradient(45deg, #00ff00, #ffff00);
            box-shadow: 0 0 25px #00ff00;
        }
        100% {
            transform: translate(0, 0) rotate(360deg) scale(1);
            background: linear-gradient(45deg, #ff0000, #ff7300);
            box-shadow: 0 0 10px #ff0000;
        }
    }
</style>
</head>

<body>

<div class="box">
    Hi, I'm Vivaan 🚀
</div>

</body>
</html>
