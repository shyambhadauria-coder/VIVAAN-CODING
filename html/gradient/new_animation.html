<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insane Animation</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: black;
        overflow: hidden;
        font-family: 'Segoe UI', sans-serif;
    }

    /* Animated background particles */
    body::before {
        content: "";
        position: absolute;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle at 30% 30%, #00f0ff22, transparent),
                    radial-gradient(circle at 70% 70%, #ff00ff22, transparent),
                    radial-gradient(circle at 50% 50%, #00ff8822, transparent);
        animation: bgMove 15s infinite linear;
    }

    @keyframes bgMove {
        0% { transform: translate(0,0) rotate(0deg); }
        100% { transform: translate(-25%, -25%) rotate(360deg); }
    }

    .card {
        position: relative;
        width: 220px;
        height: 220px;
        border-radius: 25px;
        backdrop-filter: blur(20px);
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.2);
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-size: 18px;
        text-align: center;
        z-index: 2;

        animation: float 6s ease-in-out infinite;
        transform-style: preserve-3d;
    }

    /* Glowing rotating aura */
    .card::before {
        content: "";
        position: absolute;
        width: 250%;
        height: 250%;
        background: conic-gradient(
            from 0deg,
            #ff00ff,
            #00ffff,
            #00ff00,
            #ffff00,
            #ff0000,
            #ff00ff
        );
        filter: blur(60px);
        animation: spin 8s linear infinite;
        z-index: -1;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    @keyframes float {
        0%   { transform: translateY(0px) rotateX(0deg) rotateY(0deg); }
        25%  { transform: translateY(-30px) rotateX(10deg) rotateY(10deg); }
        50%  { transform: translateY(0px) rotateX(0deg) rotateY(20deg); }
        75%  { transform: translateY(30px) rotateX(-10deg) rotateY(-10deg); }
        100% { transform: translateY(0px) rotateX(0deg) rotateY(0deg); }
    }

    /* Cursor interaction glow */
    .cursor-glow {
        position: absolute;
        width: 300px;
        height: 300px;
        background: radial-gradient(circle, #00ffff55, transparent 70%);
        pointer-events: none;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        mix-blend-mode: screen;
    }
</style>
</head>

<body>

<div class="card">
    Hi, I'm Vivaan ⚡
</div>

<div class="cursor-glow" id="glow"></div>

<script>
    const glow = document.getElementById("glow");

    document.addEventListener("mousemove", (e) => {
        glow.style.left = e.clientX + "px";
        glow.style.top = e.clientY + "px";
    });
</script>

</body>
</html>
