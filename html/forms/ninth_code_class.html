<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <h1 style="background-color: aquamarine; text-align: center;">Personal Details Form</h1>
    <form>
        <label style="color:red;">Name</label><br>
        <input type="text" name="name"><br><br>
        <label style="color: coral;">Email ID</label><br>
        <input type="email" name="email"><br><br>
        <label style="color: blue;">Phone Number (This will be hidden)</label><br>
        <input type="password" name="phone"><br><br>
        <label style="color: cyan;">Gender</label><br>
        <input type="radio" id="female" name="gender" value="female">Female<br>
        <input type="radio" id="male" name="gender" value="male">Male<br><br>
        <label style="color: chartreuse;">Favourite City</label><br>
        <input type="checkbox" id="city" value="New Delhi">New Delhi<br>
        <input type="checkbox" id="city" value="Mumbai">Mumbai<br>
        <input type="submit" value="Submit">
    </form>
</body>
</html>
